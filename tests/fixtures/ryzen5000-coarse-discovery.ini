# Generated CoreCycler phase config
# PhaseName = ryzen5000-coarse-discovery
# PhaseType = CoarseIsolatedDiscovery
# PhaseOrder = 30
# RyzenGeneration = Ryzen5000
# RyzenMinimumCurveOptimizer = -30
# Review before use. SMU-applied Curve Optimizer values are temporary unless persisted elsewhere.

[General]
stressTestProgram = PRIME95
runtimePerCore = 6m
suspendPeriodically = 1
coreTestOrder = Default
skipCoreOnError = 1
stopOnError = 0
numberOfThreads = 1
maxIterations = 1
restartTestProgramForEachCore = 0
delayBetweenCores = 15
lookForWheaErrors = 1
treatWheaWarningAsError = 1

[Prime95]
mode = SSE
FFTSize = Huge

[AutomaticTestMode]
enableAutomaticAdjustment = 1
startValues = CurrentValues
maxValue = 0
incrementBy = 3
setVoltageOnlyForTestedCore = 1
voltageValueForNotTestedCores = 0
repeatCoreOnError = 1
enableResumeAfterUnexpectedExit = 0
createSystemRestorePoint = 1
askForSystemRestorePointCreation = 1

[Logging]
name = CoreCycler
useWindowsEventLog = 1
