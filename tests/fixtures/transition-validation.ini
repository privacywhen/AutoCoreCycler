# Generated CoreCycler phase config
# PhaseName = transition-validation
# PhaseType = TransitionValidation
# PhaseOrder = 70
# RyzenGeneration = Ryzen7000
# RyzenMinimumCurveOptimizer = -50
# Review before use. SMU-applied Curve Optimizer values are temporary unless persisted elsewhere.
# CandidateMap = -18, -15, -13, -26
# MapApplication = Candidate map must already be active before transition validation; with enableAutomaticAdjustment = 0, CoreCycler will not apply startValues.

[General]
stressTestProgram = PRIME95
runtimePerCore = 10m
suspendPeriodically = 1
coreTestOrder = CorePairs
skipCoreOnError = 1
stopOnError = 0
numberOfThreads = 1
maxIterations = 1
restartTestProgramForEachCore = 0
delayBetweenCores = 15
lookForWheaErrors = 1
treatWheaWarningAsError = 1

[Prime95]
mode = SSE
FFTSize = Huge

[AutomaticTestMode]
enableAutomaticAdjustment = 0
startValues = -18, -15, -13, -26
maxValue = 0
incrementBy = Default
setVoltageOnlyForTestedCore = 0
voltageValueForNotTestedCores = 0
repeatCoreOnError = 1
enableResumeAfterUnexpectedExit = 0
createSystemRestorePoint = 1
askForSystemRestorePointCreation = 1

[Logging]
name = CoreCycler
useWindowsEventLog = 1
