# Generated CoreCycler phase config
# PhaseName = ryzen9000-alt-validation
# PhaseType = AlternateWorkloadValidation
# PhaseOrder = 80
# RyzenGeneration = Ryzen9000
# RyzenMinimumCurveOptimizer = -50
# Review before use. SMU-applied Curve Optimizer values are temporary unless persisted elsewhere.

[General]
stressTestProgram = YCRUNCHER
runtimePerCore = auto
suspendPeriodically = 1
coreTestOrder = Default
skipCoreOnError = 1
stopOnError = 0
numberOfThreads = 1
maxIterations = 1
restartTestProgramForEachCore = 1
delayBetweenCores = 5
lookForWheaErrors = 1
treatWheaWarningAsError = 1

[yCruncher]
mode = 24-ZN5 ~ Komari
tests = SFTv4, FFTv4, N63
testDuration = 20
enableYCruncherLoggingWrapper = 1

[AutomaticTestMode]
enableAutomaticAdjustment = 0
startValues = CurrentValues
maxValue = 0
incrementBy = Default
setVoltageOnlyForTestedCore = 0
voltageValueForNotTestedCores = 0
repeatCoreOnError = 1
enableResumeAfterUnexpectedExit = 0
createSystemRestorePoint = 1
askForSystemRestorePointCreation = 1

[Logging]
name = CoreCycler
useWindowsEventLog = 1
